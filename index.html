<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap');


* {
    box-sizing: border-box;
}


html, body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: transparent;

    font-family: Arial, Helvetica, sans-serif;

}


/* HERO */

.hero {

    width: 100%;

    height: 700px;

    display: flex;

    align-items: center;

    justify-content: center;

    gap: 60px;

    padding: 0;

    transform: translateY(60px);

}



/* HEADSHOT */

.headshot {

    width: 330px;

    height: 420px;

    object-fit: contain;

    border-radius: 12px;

    opacity: 0;

    transform: translateX(-60px);

    animation: imageFade 1.5s ease forwards;

}



/* TEXT */

.text {

    text-align: center;

}



.name {

    font-family: "Rock Salt", cursive;

    font-size: 60px;

    line-height: 1.3;

    opacity: 0;

    transform: translateY(25px);

    animation: textFade 2s ease forwards;

    animation-delay: 1s;

}



.welcome {

    font-size: 34px;

    margin-top: 20px;

    opacity: 0;

    transform: translateY(20px);

    animation: textFade 2s ease forwards;

    animation-delay: 2s;

}



/* ANIMATIONS */


@keyframes imageFade {

    from {

        opacity: 0;

        transform: translateX(-60px);

    }

    to {

        opacity: 1;

        transform: translateX(0);

    }

}



@keyframes textFade {

    from {

        opacity: 0;

        transform: translateY(25px);

    }

    to {

        opacity: 1;

        transform: translateY(0);

    }

}



/* MOBILE */

@media(max-width:800px) {

    .hero {

        height:100vh;

        transform:none;

        flex-direction:column;

        justify-content:center;

        align-items:center;

        gap:15px;

        padding:20px;

    }

}


    .headshot {

        width: 170px;

        height: 220px;

    }



    .name {

        font-size: 32px;

    }



    .welcome {

        font-size: 22px;

        margin-top: 10px;

    }


}


</style>

</head>


<body>


<div class="hero">


    <img
        class="headshot"
        src="hunter-meyer-headshot.jpg"
        alt="Headshot of Hunter Meyer">


    <div class="text">


        <div class="name">
            Hunter Meyer
        </div>


        <div class="welcome">
            Welcome!
        </div>


    </div>


</div>


</body>

</html>
