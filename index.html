<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap');


* {
    box-sizing: border-box;
}


html, body {

    margin: 0;
    padding: 0;

    width: 100%;

    background: transparent;

    overflow: hidden;

    font-family: Arial, sans-serif;

}



/* HERO SECTION */

.hero {

    width: 100%;

    height: 450px;

    display: flex;

    align-items: center;

    justify-content: center;

    gap: 50px;

    overflow: hidden;

}



/* HEADSHOT */

.headshot {

    width: 300px;

    height: 380px;

    object-fit: contain;

    border-radius: 12px;

    opacity: 0;

    transform: translateX(-50px);

    animation: imageFade 1.5s ease forwards;

}



/* TEXT */

.text {

    text-align: center;

}



.name {

    font-family: "Rock Salt", cursive;

    font-size: 55px;

    line-height: 1.3;

    opacity: 0;

    transform: translateY(20px);

    animation: fadeIn 2s ease forwards;

    animation-delay: 1s;

}



.welcome {

    font-size: 32px;

    margin-top: 15px;

    opacity: 0;

    transform: translateY(20px);

    animation: fadeIn 2s ease forwards;

    animation-delay: 2s;

}



/* ANIMATIONS */


@keyframes imageFade {

    from {

        opacity: 0;

        transform: translateX(-50px);

    }


    to {

        opacity: 1;

        transform: translateX(0);

    }

}



@keyframes fadeIn {

    from {

        opacity: 0;

        transform: translateY(20px);

    }


    to {

        opacity: 1;

        transform: translateY(0);

    }

}



/* MOBILE */

@media(max-width:800px) {


    .hero {

        height: 450px;

        flex-direction: column;

        gap: 10px;

        padding: 20px;

    }



    .headshot {

        width: 150px;

        height: 190px;

    }



    .name {

        font-size: 30px;

    }



    .welcome {

        font-size: 21px;

        margin-top: 8px;

    }


}


</style>

</head>


<body>


<div class="hero">


    <img class="headshot"
    src="https://drive.google.com/file/d/1CWqvHR3Aqxr7s0VjctbopJqq4ffzyKQ0/view?usp=drive_link">


    <div class="text">

        <div class="name">
            Hunter Meyer
        </div>


        <div class="welcome">
            Welcome!
        </div>


    </div>


</div>


</body>

</html>
