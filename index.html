<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap');


* {
    box-sizing: border-box;
}


html, body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: transparent;

    font-family: Arial, sans-serif;

}



/* HERO */

.hero {

    width: 100%;
    height: 100dvh;

    display: flex;

    align-items: center;
    justify-content: center;

    gap: clamp(30px, 6vw, 80px);

    padding: 40px;

}



/* HEADSHOT */

.headshot {

    width: clamp(180px, 28vw, 330px);

    height: clamp(240px, 38vw, 430px);

    object-fit: cover;

    border-radius: 12px;

    opacity: 0;

    transform: translateX(-60px);

    animation: imageFade 1.5s ease forwards;

}



/* TEXT */

.text {

    text-align: center;

    max-width: 550px;

}



.name {

    font-family: "Rock Salt", cursive;

    font-size: clamp(35px, 5vw, 70px);

    line-height: 1.3;

    opacity: 0;

    transform: translateY(25px);

    animation: fadeIn 2s ease forwards;

    animation-delay: 1s;

}



.welcome {

    font-size: clamp(22px, 3vw, 35px);

    margin-top: 20px;

    opacity: 0;

    transform: translateY(20px);

    animation: fadeIn 2s ease forwards;

    animation-delay: 2s;

}



/* ANIMATIONS */


@keyframes imageFade {

    from {

        opacity: 0;

        transform: translateX(-60px);

    }


    to {

        opacity: 1;

        transform: translateX(0);

    }

}



@keyframes fadeIn {

    from {

        opacity: 0;

        transform: translateY(25px);

    }


    to {

        opacity: 1;

        transform: translateY(0);

    }

}



/* MOBILE */

@media(max-width:800px) {


    .hero {

        height: 100dvh;

        flex-direction: column;

        justify-content: center;

        gap: 18px;

        padding: 25px 20px;

    }



    .headshot {

        width: min(55vw, 200px);

        height: min(70vw, 260px);

        object-fit: cover;

    }



    .name {

        font-size: clamp(28px, 8vw, 40px);

    }



    .welcome {

        font-size: 22px;

        margin-top: 10px;

    }


}


</style>

</head>


<body>


<div class="hero">


    <img class="headshot"
    src="https://lh3.googleusercontent.com/sitesv/AA5AbUCiVRUBcopAX2D_MGH6PzUivXzmieOM71l5ZKEDBC_HtW0EfR7quvdEFLAllKmopZh2eEAtPPzX2KCrAwft9D6vz8pMzsLF8e9cxUDsylY_OYMzivz1gLCkxi8bk_f-USmhBY3Jtx8nkP0U8878mZW8_qHNGDoIhMp36Yn1us_GtWvj3ShQTT_D2JU_bpBqVAOvTBmwpErzI8FG2Ic9cxb6P2LyWlVcOlkNsEaPRnk=w1280">


    <div class="text">

        <div class="name">
            Hunter Meyer
        </div>


        <div class="welcome">
            Welcome!
        </div>


    </div>


</div>


</body>

</html>
